<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastPari Official Offer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        .container {
            background-color: #002D1D; /* সেই ডার্ক গ্রিন কালার */
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo-circle {
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #002D1D;
            font-size: 24px;
            border: 4px solid #facc15;
        }
        h1 { font-size: 1.4rem; margin-bottom: 5px; color: #fff; }
        .subtitle { color: #facc15; font-size: 14px; margin-bottom: 20px; }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 25px 0;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        .val { font-size: 18px; font-weight: bold; color: #fff; }
        .lbl { font-size: 11px; color: #aaa; }
        .promo-box {
            background: rgba(250, 204, 21, 0.1);
            border: 1px dashed #facc15;
            padding: 10px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .btn {
            display: block;
            background: #facc15;
            color: #000;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.03); background: #eab308; }
        .footer-text { font-size: 10px; color: #666; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-circle">FP</div>
        <h1>FASTPARI OFFICIAL 2026</h1>
        <div class="subtitle">Real-Time Odds • Instant Withdrawal • 24/7 Support</div>
        
        <div class="promo-box">
            <p style="margin: 0; font-size: 14px;">Use Promo Code for 200% Bonus:</p>
            <b style="color: #facc15; font-size: 22px; letter-spacing: 2px;">fas_24578</b>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><span class="val">50K+</span><span class="lbl">Users</span></div>
            <div class="stat-item"><span class="val">99%</span><span class="lbl">Safe</span></div>
            <div class="stat-item"><span class="val">4.9★</span><span class="lbl">Rating</span></div>
        </div>

        <a href=https://t.me/fastpariagentnetwork class="btn">🚀 JOIN TELEGRAM FOR TIPS</a>

        <div class="footer-text">
            © 2026 FastPari Partners. All Rights Reserved.<br>
            সারা দেশে মোভক্যাশ এজেন্ট নিয়োগ চলছে!
        </div>
    </div>
</body>
</html>
